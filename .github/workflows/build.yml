name: Build Debug APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # lets you trigger it manually from GitHub website

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.9'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml') }}
          restore-keys: gradle-

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx2g"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FocusBridge-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
